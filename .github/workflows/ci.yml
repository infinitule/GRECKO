name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  invariants-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Architectural invariant gate
        run: python -m tools.verify_invariants

      - name: Acceptance suite
        run: python -m pytest sim/tests -q
