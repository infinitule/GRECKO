name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  invariants-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Architectural invariant gate
        run: grecko verify
      - name: Acceptance suite
        run: python -m pytest sim/tests -q

  console-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viz
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npx vite build
